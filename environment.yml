name: svi-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  # Core data science stack
  - python=3.10
  - numpy>=1.20.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Geospatial processing
  - geopandas>=0.10.0
  - shapely>=1.7.0
  - proj
  - geos
  
  # Visualization
  - matplotlib>=3.3.0
  
  # Jupyter (includes ipykernel automatically)
  - jupyter>=1.0.0
  
  # File I/O
  - openpyxl>=3.0.0
  - pyarrow>=5.0.0
  
  # Development tools
  - git
  - pip

# Pip dependencies (packages not available in conda)
pip:
# create PDF codebook of clean data files
  - pypdfcodebook
